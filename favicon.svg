<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!--
    Pixel-art soccer player favicon — matches the canvas characters at the top of the page.
    The grid is 16 columns × 20 rows. Each <rect> is one "pixel block" (1×1 grid unit).
    shape-rendering="crispEdges" keeps pixels sharp at small sizes (no anti-aliasing).

    Color key:
      #0d0d0d  page background
      #3d1c00  hair (HR)
      #f5c897  skin (SK)
      #111111  eyes / shorts / boot sole (EY / PT / BS)
      #1a55ee  blue jersey (JR)
      #5588ff  jersey stripe (JS)
      #e8e8e8  white socks (WS)
      #cc0000  red sock stripe (WB)
      #4a2800  boot upper (BT)
      #ffffff  ball white panel (BW)
      #222222  ball dark patch (BD)
  -->

  <!-- square background — fills the full favicon slot so no white bars appear -->
  <rect width="20" height="20" fill="#0d0d0d"/>
  <!-- shift sprite 2 units right to center the 16-wide content in 20-wide viewBox -->
  <g transform="translate(2, 0)">

  <!-- row 0 — hair -->
  <rect x="5" y="0" width="1" height="1" fill="#3d1c00"/>
  <rect x="6" y="0" width="1" height="1" fill="#3d1c00"/>
  <rect x="7" y="0" width="1" height="1" fill="#3d1c00"/>
  <rect x="8" y="0" width="1" height="1" fill="#3d1c00"/>
  <rect x="9" y="0" width="1" height="1" fill="#3d1c00"/>

  <!-- row 1 — head top -->
  <rect x="4" y="1" width="1" height="1" fill="#3d1c00"/>
  <rect x="5" y="1" width="1" height="1" fill="#f5c897"/>
  <rect x="6" y="1" width="1" height="1" fill="#f5c897"/>
  <rect x="7" y="1" width="1" height="1" fill="#f5c897"/>
  <rect x="8" y="1" width="1" height="1" fill="#f5c897"/>
  <rect x="9" y="1" width="1" height="1" fill="#f5c897"/>
  <rect x="10" y="1" width="1" height="1" fill="#3d1c00"/>

  <!-- row 2 — eyes -->
  <rect x="4" y="2" width="1" height="1" fill="#f5c897"/>
  <rect x="5" y="2" width="1" height="1" fill="#111111"/>
  <rect x="6" y="2" width="1" height="1" fill="#f5c897"/>
  <rect x="7" y="2" width="1" height="1" fill="#f5c897"/>
  <rect x="8" y="2" width="1" height="1" fill="#f5c897"/>
  <rect x="9" y="2" width="1" height="1" fill="#111111"/>
  <rect x="10" y="2" width="1" height="1" fill="#f5c897"/>

  <!-- row 3 — face -->
  <rect x="4" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="5" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="6" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="7" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="8" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="9" y="3" width="1" height="1" fill="#f5c897"/>
  <rect x="10" y="3" width="1" height="1" fill="#f5c897"/>

  <!-- row 4 — collar -->
  <rect x="4" y="4" width="1" height="1" fill="#1a55ee"/>
  <rect x="5" y="4" width="1" height="1" fill="#1a55ee"/>
  <rect x="6" y="4" width="1" height="1" fill="#f5c897"/>
  <rect x="7" y="4" width="1" height="1" fill="#f5c897"/>
  <rect x="8" y="4" width="1" height="1" fill="#1a55ee"/>
  <rect x="9" y="4" width="1" height="1" fill="#1a55ee"/>
  <rect x="10" y="4" width="1" height="1" fill="#1a55ee"/>

  <!-- row 5 — shoulders -->
  <rect x="3" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="4" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="5" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="6" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="7" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="8" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="9" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="10" y="5" width="1" height="1" fill="#1a55ee"/>
  <rect x="11" y="5" width="1" height="1" fill="#1a55ee"/>

  <!-- row 6 — jersey upper -->
  <rect x="2" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="3" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="4" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="5" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="6" y="6" width="1" height="1" fill="#5588ff"/>
  <rect x="7" y="6" width="1" height="1" fill="#5588ff"/>
  <rect x="8" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="9" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="10" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="11" y="6" width="1" height="1" fill="#1a55ee"/>
  <rect x="12" y="6" width="1" height="1" fill="#1a55ee"/>

  <!-- row 7 — arms out -->
  <rect x="1" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="2" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="3" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="4" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="5" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="6" y="7" width="1" height="1" fill="#5588ff"/>
  <rect x="7" y="7" width="1" height="1" fill="#5588ff"/>
  <rect x="8" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="9" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="10" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="11" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="12" y="7" width="1" height="1" fill="#1a55ee"/>
  <rect x="13" y="7" width="1" height="1" fill="#1a55ee"/>

  <!-- row 8 — forearms / hands -->
  <rect x="1" y="8" width="1" height="1" fill="#f5c897"/>
  <rect x="2" y="8" width="1" height="1" fill="#f5c897"/>
  <rect x="3" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="4" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="5" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="6" y="8" width="1" height="1" fill="#5588ff"/>
  <rect x="7" y="8" width="1" height="1" fill="#5588ff"/>
  <rect x="8" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="9" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="10" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="11" y="8" width="1" height="1" fill="#1a55ee"/>
  <rect x="12" y="8" width="1" height="1" fill="#f5c897"/>
  <rect x="13" y="8" width="1" height="1" fill="#f5c897"/>

  <!-- rows 9-10 — shorts -->
  <rect x="3" y="9" width="8" height="2" fill="#111111"/>

  <!-- row 11 — thighs / upper socks -->
  <rect x="3" y="11" width="1" height="1" fill="#e8e8e8"/>
  <rect x="4" y="11" width="1" height="1" fill="#e8e8e8"/>
  <rect x="5" y="11" width="1" height="1" fill="#e8e8e8"/>
  <rect x="8" y="11" width="1" height="1" fill="#e8e8e8"/>
  <rect x="9" y="11" width="1" height="1" fill="#e8e8e8"/>
  <rect x="10" y="11" width="1" height="1" fill="#e8e8e8"/>

  <!-- rows 12-13 — socks -->
  <rect x="3" y="12" width="2" height="2" fill="#e8e8e8"/>
  <rect x="9" y="12" width="2" height="2" fill="#e8e8e8"/>

  <!-- row 14 — red sock stripe -->
  <rect x="3" y="14" width="2" height="1" fill="#cc0000"/>
  <rect x="9" y="14" width="2" height="1" fill="#cc0000"/>

  <!-- row 15 — lower socks -->
  <rect x="3" y="15" width="2" height="1" fill="#e8e8e8"/>
  <rect x="9" y="15" width="2" height="1" fill="#e8e8e8"/>

  <!-- row 16 — boot uppers -->
  <rect x="2" y="16" width="4" height="1" fill="#4a2800"/>
  <rect x="7" y="16" width="4" height="1" fill="#4a2800"/>

  <!-- row 17 — boot soles -->
  <rect x="1" y="17" width="1" height="1" fill="#111111"/>
  <rect x="2" y="17" width="1" height="1" fill="#111111"/>
  <rect x="3" y="17" width="3" height="1" fill="#4a2800"/>
  <rect x="6" y="17" width="1" height="1" fill="#111111"/>
  <rect x="7" y="17" width="1" height="1" fill="#111111"/>
  <rect x="8" y="17" width="3" height="1" fill="#4a2800"/>
  <rect x="11" y="17" width="1" height="1" fill="#111111"/>

  <!-- rows 18-19 — soccer ball -->
  <rect x="5" y="18" width="1" height="1" fill="#ffffff"/>
  <rect x="6" y="18" width="1" height="1" fill="#222222"/>
  <rect x="7" y="18" width="1" height="1" fill="#ffffff"/>
  <rect x="8" y="18" width="1" height="1" fill="#222222"/>
  <rect x="5" y="19" width="1" height="1" fill="#222222"/>
  <rect x="6" y="19" width="1" height="1" fill="#ffffff"/>
  <rect x="7" y="19" width="1" height="1" fill="#222222"/>
  <rect x="8" y="19" width="1" height="1" fill="#ffffff"/>
  </g>
</svg>
