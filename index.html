<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ninja Stats 2026</title>
  </head>
  <body>
    <!--
      This is the single HTML page for the React app.
      React mounts into this empty <div>. Everything you see on screen
      is generated by JavaScript — the div starts empty and React fills it in.
    -->
    <div id="root"></div>

    <!--
      This script tag loads our React entry point (src/main.jsx).
      type="module" tells the browser this is an ES Module (modern JS).
      Vite intercepts this in dev mode and serves the file with hot reload.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
